version: "2"

run:
  timeout: 5m
  build-tags:
    - cli
  modules-download-mode: readonly
  tests: false

linters:
  default: standard
  enable:
    - gosec
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
  disable:
    - depguard
  exclusions:
    paths:
      - vendor
      - fyne
      - testdata
    presets:
      - std-error-handling
    rules:
      - path: internal/ui/
        linters:
          - typecheck
      # gosec G115 false positives — mirrors root .golangci.yml policy:
      # fd/syscall/size/color conversions bounded well below 2^63.
      - path: internal/fileops/
        linters:
          - gosec
        text: G115
      - path: internal/cli/
        linters:
          - gosec
        text: G115
      - path: internal/header/
        linters:
          - gosec
        text: G115
      # Platform false positive: appendOpenedPath/flushOpenedPaths and the
      # openedPathsNotify handler are called only from macos_open_darwin.go
      # (//go:build darwin), which the linux lint host never compiles, so the
      # unused linter cannot see their callers. The symbols are live on macOS
      # and are exercised by drop_test.go.
      - path: internal/ui/macos_open\.go
        linters:
          - unused
  settings:
    gosec:
      excludes:
        - G304 # File inclusion via variable - expected for file encryption tool
        - G204 # Subprocess with variable - test builds
      config:
        global:
          nosec: true
          show-ignored: false
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
    staticcheck:
      checks:
        - "all"
        - "-QF1003" # tagged switch suggestion - too pedantic
