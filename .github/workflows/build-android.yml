name: build-android

permissions:
  contents: read

on:
  push:
    paths:
      - "VERSION"
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: "1.26.0"
        cache-dependency-path: src/go.sum

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260209203831-923679eb55af
        go install golang.org/x/mobile/cmd/gobind@v0.0.0-20260209203831-923679eb55af
        mkdir -p "$(go env GOPATH | cut -d: -f1)/pkg/gomobile"

    - name: Set up Android SDK
      uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

    - name: Set up JDK 21
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        distribution: "temurin"
        java-version: "21"

    - name: Install Android SDK packages
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager "platforms;android-37.0" "build-tools;36.0.0" "ndk;29.0.14206865"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"

    - name: Cache Gradle dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          android/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Compute Android version metadata
      run: |
        VERSION=$(cat VERSION)
        IFS='.' read -r major minor patch <<< "$VERSION"
        major=${major:-0}
        minor=${minor:-0}
        patch=${patch:-0}
        VERSION_CODE=$((10#$major * 10000 + 10#$minor * 100 + 10#$patch))
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"
        echo "ORG_GRADLE_PROJECT_PICOCRYPT_VERSION_NAME=$VERSION" >> "$GITHUB_ENV"
        echo "ORG_GRADLE_PROJECT_PICOCRYPT_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

    - name: Build Go Mobile AAR
      working-directory: android
      run: |
        chmod +x build-gomobile.sh
        ./build-gomobile.sh

    - name: Make gradlew executable
      working-directory: android
      run: chmod +x gradlew

    - name: Run Unit Tests
      working-directory: android
      run: ./gradlew test

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: build-android-gomobile
        path: android/app/libs/picocrypt-mobile.aar
        if-no-files-found: error
        compression-level: 9

  release:
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Download artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build-android-gomobile
        path: android/app/libs

    - name: Set up Android SDK
      uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

    - name: Install Android SDK packages
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager "platforms;android-37.0" "build-tools;36.0.0"

    - name: Set up JDK 21
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        distribution: "temurin"
        java-version: "21"

    - name: Cache Gradle dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          android/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Get version tag
      run: |
        VERSION=$(cat VERSION)
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"
        IFS='.' read -r major minor patch <<< "$VERSION"
        major=${major:-0}
        minor=${minor:-0}
        patch=${patch:-0}
        VERSION_CODE=$((10#$major * 10000 + 10#$minor * 100 + 10#$patch))
        echo "ORG_GRADLE_PROJECT_PICOCRYPT_VERSION_NAME=$VERSION" >> "$GITHUB_ENV"
        echo "ORG_GRADLE_PROJECT_PICOCRYPT_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

    - name: Decode Android signing keystore
      id: android-keystore
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        : "${ANDROID_KEYSTORE_BASE64:?Missing ANDROID_KEYSTORE_BASE64 secret}"
        KEYSTORE_PATH="$RUNNER_TEMP/picocrypt-release.keystore"
        printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
        chmod 600 "$KEYSTORE_PATH"
        echo "path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"

    - name: Make gradlew executable
      working-directory: android
      run: chmod +x gradlew

    - name: Build Signed Release APK
      working-directory: android
      env:
        ORG_GRADLE_PROJECT_PICOCRYPT_KEYSTORE_PATH: ${{ steps.android-keystore.outputs.path }}
        ORG_GRADLE_PROJECT_PICOCRYPT_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ORG_GRADLE_PROJECT_PICOCRYPT_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ORG_GRADLE_PROJECT_PICOCRYPT_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        : "${ORG_GRADLE_PROJECT_PICOCRYPT_KEYSTORE_PATH:?Missing keystore path}"
        : "${ORG_GRADLE_PROJECT_PICOCRYPT_KEYSTORE_PASSWORD:?Missing ANDROID_KEYSTORE_PASSWORD secret}"
        : "${ORG_GRADLE_PROJECT_PICOCRYPT_KEY_ALIAS:?Missing ANDROID_KEY_ALIAS secret}"
        : "${ORG_GRADLE_PROJECT_PICOCRYPT_KEY_PASSWORD:?Missing ANDROID_KEY_PASSWORD secret}"
        ./gradlew :app:assembleRelease \
          -PPICOCRYPT_REQUIRE_RELEASE_SIGNING=true

    - name: Prepare artifacts
      run: |
        mkdir -p out
        src=android/app/build/outputs/apk/release
        # ABI splits produce per-ABI APKs (~15 MB smaller each) plus a universal fallback.
        cp "$src/app-arm64-v8a-release.apk"   out/Picocrypt-NG-android-arm64-v8a.apk
        cp "$src/app-armeabi-v7a-release.apk" out/Picocrypt-NG-android-armeabi-v7a.apk
        cp "$src/app-x86_64-release.apk"      out/Picocrypt-NG-android-x86_64.apk
        cp "$src/app-x86-release.apk"         out/Picocrypt-NG-android-x86.apk
        cp "$src/app-universal-release.apk"   out/Picocrypt-NG-android-universal.apk

    - name: Sign and attest artifacts
      uses: ./.github/actions/sign-and-attest
      with:
        paths: |
          out/*.apk

    - name: Generate release notes
      uses: ./.github/actions/release-body
      with:
        version: ${{ env.VERSION }}

    - name: Release
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      with:
        body_path: ${{ github.workspace }}/release-body.md
        files: |
          out/*.apk
          out/*.sigstore.json
        tag_name: ${{ env.VERSION }}
        make_latest: true
