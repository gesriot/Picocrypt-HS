name: pr-test-build-android

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-test-build-android:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: "1.26.5"
        cache-dependency-path: src/go.sum

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260709172247-6129f5bee9d5
        go install golang.org/x/mobile/cmd/gobind@v0.0.0-20260709172247-6129f5bee9d5
        mkdir -p "$(go env GOPATH | cut -d: -f1)/pkg/gomobile"

    - name: Set up Android SDK
      uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

    - name: Set up JDK 21
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: "temurin"
        java-version: "21"

    - name: Install Android SDK packages
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager "platforms;android-37.0" "build-tools;36.0.0" "ndk;29.0.14206865"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"

    - name: Cache Gradle dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          android/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Compute Android version metadata
      run: |
        VERSION=$(cat VERSION)
        IFS='.' read -r major minor patch <<< "$VERSION"
        major=${major:-0}
        minor=${minor:-0}
        patch=${patch:-0}
        VERSION_CODE=$((10#$major * 10000 + 10#$minor * 100 + 10#$patch))
        echo "ORG_GRADLE_PROJECT_PICOCRYPT_VERSION_NAME=$VERSION" >> "$GITHUB_ENV"
        echo "ORG_GRADLE_PROJECT_PICOCRYPT_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

    - name: Build Go Mobile AAR
      working-directory: android
      run: |
        chmod +x build-gomobile.sh
        ./build-gomobile.sh

    - name: Make gradlew executable
      working-directory: android
      run: chmod +x gradlew

    - name: Run Unit Tests
      working-directory: android
      run: ./gradlew test

    - name: Build Debug APK
      working-directory: android
      run: ./gradlew assembleDebug

    - name: Build Release APK
      working-directory: android
      run: ./gradlew :app:assembleRelease

    - name: Verify Android 7 and ABI packaging
      working-directory: android
      run: |
        aapt="$ANDROID_HOME/build-tools/36.0.0/aapt"
        universal="app/build/outputs/apk/release/app-universal-release-unsigned.apk"

        require_file() {
          if [ ! -s "$1" ]; then
            echo "Missing or empty APK: $1" >&2
            exit 1
          fi
        }
        require_min_sdk_24() {
          if ! "$aapt" dump badging "$1" | grep -Fx "sdkVersion:'24'" >/dev/null; then
            echo "APK does not declare minSdk 24: $1" >&2
            exit 1
          fi
        }
        require_entry() {
          if ! unzip -Z1 "$1" | grep -Fx "$2" >/dev/null; then
            echo "APK $1 is missing $2" >&2
            exit 1
          fi
        }

        require_file "$universal"
        require_min_sdk_24 "$universal"
        for abi in armeabi-v7a arm64-v8a x86 x86_64; do
          split="app/build/outputs/apk/release/app-${abi}-release-unsigned.apk"
          require_file "$split"
          require_min_sdk_24 "$split"
          require_entry "$split" "lib/${abi}/libgojni.so"
          require_entry "$universal" "lib/${abi}/libgojni.so"
        done

    - name: Assemble Instrumented Test APK
      working-directory: android
      run: ./gradlew :app:assembleDebugAndroidTest

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run Android 7 crypto roundtrip (API 24)
      uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
      with:
        # API 24 is the documented compatibility floor. Its default system image is
        # x86, so this also exercises the 32-bit gomobile library shipped to older devices.
        api-level: 24
        target: default
        arch: x86
        disable-animations: true
        # -memory 6144: the Argon2id KDF allocates 1 GiB per operation
        # (src/internal/crypto/kdf.go); the runner's default ~2.5 GiB emulator OOMs
        # (lowmemorykiller kills the test process) mid crypto roundtrip.
        emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -memory 6144 -cores 4 -camera-back none -camera-front none
        working-directory: android
        script: ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=io.github.picocrypt_ng.picocrypt_ng.OperationManagerIntegrationTest#encrypt_then_decrypt_recovers_the_original_bytes

    - name: Run target SDK crypto roundtrip (API 36)
      uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
      with:
        # API 36 matches targetSdk and exercises the current Android runtime plus
        # the 64-bit x86_64 gomobile/JNI library.
        api-level: 36
        target: default
        arch: x86_64
        disable-animations: true
        # -memory 6144: the Argon2id KDF allocates 1 GiB per operation
        # (src/internal/crypto/kdf.go); the runner's default ~2.5 GiB emulator OOMs
        # (lowmemorykiller kills the test process) mid crypto roundtrip.
        emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -memory 6144 -cores 4 -camera-back none -camera-front none
        working-directory: android
        script: ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=io.github.picocrypt_ng.picocrypt_ng.OperationManagerIntegrationTest#encrypt_then_decrypt_recovers_the_original_bytes

    - name: Upload instrumented test report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: pr-instrumented-test-report
        path: |
          android/app/build/reports/androidTests/connected/
          android/app/build/outputs/androidTest-results/connected/
        if-no-files-found: warn

    - name: Prepare artifacts
      run: |
        mkdir -p out
        cp android/app/build/outputs/apk/debug/app-debug.apk out/Picocrypt-NG-android-debug.apk

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: pr-test-build-android-ONLY-FOR-TESTING
        path: out/*.apk
        if-no-files-found: error
        compression-level: 9
