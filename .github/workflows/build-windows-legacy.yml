name: build-windows-legacy

permissions:
  contents: read

on:
  push:
    paths:
      - "VERSION"
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish artifacts to the GitHub release. Existing assets are never overwritten."
        required: false
        type: boolean
        default: false
      signpath_test:
        description: "Submit the legacy CLI to SignPath with the self-signed test policy. Never publishes a GitHub release."
        required: false
        type: boolean
        default: false
      signpath_release_dry_run:
        description: "Validate the SignPath release policy without uploading signed output or publishing a GitHub release."
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      GOTOOLCHAIN: local
      GO_LEGACY_SHA256: c9d0c79dc2b408a4ea580b62a3d093a4219f9ff95316ef891dc987827e6900e3
      UPX_SHA256: b471ebf1b7f20f4a89150264ed9a008a2a5bfd247f3c6d1184a75bb59ca08f5d
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Cache go-legacy-win7
      id: cache-go-legacy
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: C:\go-legacy
        key: ${{ runner.os }}-go-legacy-${{ env.GO_LEGACY_SHA256 }}

    - name: Download go-legacy-win7
      if: steps.cache-go-legacy.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        # Download go-legacy-win7 (Go 1.26.5 with Windows 7 support)
        Invoke-WebRequest -OutFile go-legacy.zip https://github.com/thongtech/go-legacy-win7/releases/download/v1.26.5-1/go-legacy-win7-1.26.5-1.windows_amd64.zip
        $expectedHash = $env:GO_LEGACY_SHA256
        $actualHash = (Get-FileHash go-legacy.zip -Algorithm SHA256).Hash.ToLower()
        if ($actualHash -ne $expectedHash) {
          throw "Checksum mismatch for go-legacy.zip: expected $expectedHash, got $actualHash"
        }
        Expand-Archive -DestinationPath C:\go-legacy go-legacy.zip

    - name: Add go-legacy-win7 to PATH
      shell: pwsh
      run: |
        echo "C:\go-legacy\go-legacy-win7\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Verify Go installation
      run: |
        $expectedGo = (Resolve-Path 'C:\go-legacy\go-legacy-win7\bin\go.exe').Path
        $actualGo = (Get-Command go -CommandType Application | Select-Object -First 1).Source
        if ($actualGo -ne $expectedGo) { throw "Unexpected go.exe: $actualGo; want $expectedGo" }
        $expectedRoot = (Resolve-Path 'C:\go-legacy\go-legacy-win7').Path
        $actualRoot = (go env GOROOT).Trim()
        if ($actualRoot -ne $expectedRoot) { throw "Unexpected GOROOT: $actualRoot; want $expectedRoot" }
        $actualVersion = (go env GOVERSION).Trim()
        if ($actualVersion -ne 'go1.26.5') { throw "Unexpected Go version: $actualVersion" }
        if ((go env GOTOOLCHAIN).Trim() -ne 'local') { throw 'GOTOOLCHAIN must be local' }
        go version

    - name: Install dependencies
      run: |
        cd src
        go mod download

    - name: Run tests
      run: |
        cd src
        go test -v -timeout 15m ./internal/cli ./internal/fileops ./internal/volume
      env:
        PICOCRYPT_RUN_CLI_INTEGRATION: 1

    - name: Build CLI-only legacy binary
      run: |
        cd src
        go build -v -tags cli -ldflags="-s -w -extldflags=-static" -o Picocrypt-NG-cli-Legacy.exe ./cmd/picocrypt
      env:
        CGO_ENABLED: 1
        GOAMD64: v1

    - name: Verify legacy binary toolchain
      shell: pwsh
      run: |
        $buildInfo = go version -m src/Picocrypt-NG-cli-Legacy.exe | Out-String
        if ($buildInfo -notmatch 'go1\.26\.5') { throw "Legacy binary was not built by Go 1.26.5: $buildInfo" }
        $buildInfo

    - name: Compress with upx
      shell: pwsh
      run: |
        Invoke-WebRequest -OutFile upx.zip https://github.com/upx/upx/releases/download/v5.2.0/upx-5.2.0-win64.zip
        $expectedHash = $env:UPX_SHA256
        $actualHash = (Get-FileHash upx.zip -Algorithm SHA256).Hash.ToLower()
        if ($actualHash -ne $expectedHash) {
          throw "Checksum mismatch for upx.zip: expected $expectedHash, got $actualHash"
        }
        Expand-Archive -DestinationPath upx upx.zip
        upx/upx-5.2.0-win64/upx.exe --lzma src/Picocrypt-NG-cli-Legacy.exe

    - name: Upload artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: unsigned-windows-legacy
        path: src/Picocrypt-NG-cli-Legacy.exe
        if-no-files-found: error
        compression-level: 9
        retention-days: 1

  sign:
    needs: build
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.publish_release || inputs.signpath_test || inputs.signpath_release_dry_run) }}
    runs-on: windows-2022
    timeout-minutes: 30
    environment: release
    permissions:
      actions: read
      contents: read
    env:
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ inputs.signpath_test && 'test-signing' || 'release-signing' }}
      SIGNPATH_TEST: ${{ inputs.signpath_test && 'true' || 'false' }}
      SIGNPATH_PRODUCTION_CERTIFICATE_SHA256: ${{ vars.SIGNPATH_PRODUCTION_CERTIFICATE_SHA256 }}
    steps:
    - name: Reject conflicting SignPath modes
      if: ${{ inputs.signpath_test && inputs.signpath_release_dry_run }}
      shell: pwsh
      run: throw "signpath_test and signpath_release_dry_run cannot both be enabled"

    - name: Download unsigned build artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: unsigned-windows-legacy
        path: unsigned-legacy

    - name: Upload unsigned legacy CLI for SignPath
      id: upload-signpath-legacy
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: signpath-windows-legacy
        path: unsigned-legacy/Picocrypt-NG-cli-Legacy.exe
        if-no-files-found: error
        compression-level: 0
        retention-days: 1

    - name: Sign legacy CLI with SignPath
      uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: d6e78672-6bae-47d3-b2b8-fa464705b34e
        project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
        signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
        artifact-configuration-slug: windows-legacy-cli
        github-artifact-id: ${{ steps.upload-signpath-legacy.outputs.artifact-id }}
        wait-for-completion: true
        output-artifact-directory: signpath-signed-legacy

    - name: Verify legacy Authenticode signature
      shell: pwsh
      run: |
        $path = "signpath-signed-legacy/Picocrypt-NG-cli-Legacy.exe"
        $signature = Get-AuthenticodeSignature -FilePath $path
        if ($null -eq $signature.SignerCertificate) {
          throw "No Authenticode signer certificate: $path"
        }
        if (@("NotSigned", "HashMismatch", "NotSupported") -contains [string]$signature.Status) {
          throw "Invalid Authenticode signature: $($signature.Status) $($signature.StatusMessage)"
        }
        if ($env:SIGNPATH_TEST -ne "true" -and $signature.Status -ne "Valid") {
          throw "Production Authenticode signature is not trusted: $($signature.Status) $($signature.StatusMessage)"
        }
        if ($env:SIGNPATH_TEST -ne "true" -and $null -eq $signature.TimeStamperCertificate) {
          throw "Production Authenticode signature has no timestamp: $path"
        }
        if ($env:SIGNPATH_TEST -ne "true" -and $env:SIGNPATH_PRODUCTION_CERTIFICATE_SHA256 -notmatch '^[0-9A-Fa-f]{64}$') {
          throw "SIGNPATH_PRODUCTION_CERTIFICATE_SHA256 must be the production certificate's 64-character SHA-256 fingerprint"
        }
        if ($env:SIGNPATH_TEST -ne "true") {
          $actualCertificateSHA256 = $signature.SignerCertificate.GetCertHashString(
            [System.Security.Cryptography.HashAlgorithmName]::SHA256
          )
          if ($actualCertificateSHA256 -ne $env:SIGNPATH_PRODUCTION_CERTIFICATE_SHA256) {
            throw "Unexpected production signing certificate: $actualCertificateSHA256"
          }
        }

    - name: Upload signed Windows legacy artifact
      if: ${{ !inputs.signpath_release_dry_run }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.signpath_test && 'signed-windows-legacy-TEST-DO-NOT-PUBLISH' || 'signed-windows-legacy' }}
        path: signpath-signed-legacy/Picocrypt-NG-cli-Legacy.exe
        if-no-files-found: error
        compression-level: 9
        retention-days: 1

  release:
    needs: [build, sign]
    if: ${{ github.ref == 'refs/heads/main' && !inputs.signpath_test && !inputs.signpath_release_dry_run && (github.event_name == 'push' || inputs.publish_release) }}
    runs-on: windows-2022
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Download signed artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: signed-windows-legacy
        path: artifacts/build-windows-legacy

    - name: Get version tag
      shell: pwsh
      run: |
        $version = Get-Content -Path "VERSION"
        echo "VERSION=$version" >> $env:GITHUB_ENV

    - name: Sign and attest artifacts
      uses: ./.github/actions/sign-and-attest
      with:
        paths: |
          artifacts/build-windows-legacy/Picocrypt-NG-cli-Legacy.exe

    - name: Generate release notes
      uses: ./.github/actions/release-body
      with:
        version: ${{ env.VERSION }}

    - name: Release
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
      with:
        body_path: ${{ github.workspace }}/release-body.md
        files: |
          artifacts/build-windows-legacy/Picocrypt-NG-cli-Legacy.exe
          artifacts/build-windows-legacy/*.sigstore.json
        tag_name: ${{ env.VERSION }}
        make_latest: true
        overwrite_files: false
