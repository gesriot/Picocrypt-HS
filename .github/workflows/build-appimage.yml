name: build-appimage

permissions:
  contents: read

on:
  push:
    paths:
      - "VERSION"
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish artifacts to the GitHub release. Existing assets are never overwritten."
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.ref == 'refs/heads/main' }}
    # ubuntu-22.04 (glibc 2.35) is the portability floor. AppImage was dropped once
    # "for better portability" (Changelog v1.34); building on the newest runner's glibc
    # forward-binds symbols that fail on older distros and would reproduce that. GL and
    # GPU-driver libraries are intentionally NOT bundled (linuxdeploy excludelist) -- they
    # are provided by the host, which is what keeps the AppImage portable (incl. Nvidia).
    runs-on: ubuntu-22.04
    environment: release
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: "1.26.5"
        cache-dependency-path: src/go.sum

    - name: Install packages
      run: |
        sudo apt update
        sudo apt install -y gcc pkg-config libgl1-mesa-dev xorg-dev libgtk-3-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libgl1 desktop-file-utils librsvg2-bin wget

    - name: Build GUI
      run: |
        cd src
        GOARCH=amd64 GOAMD64=v1 CGO_ENABLED=1 go build -v -ldflags="-s -w" -o Picocrypt-NG ./cmd/picocrypt

    - name: Fetch and verify AppImage tooling
      run: |
        # Pinned by sha256 and verified (fail loud), like UPX in build-linux. These are
        # linuxdeploy/appimagetool "continuous" builds; if upstream republishes them this
        # check fails and the pin must be refreshed -- intentional, not silent drift.
        wget -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        echo "514d4ffe2a2f757369b41863a4f63fbbb222c429652803ebc081cb16ba21ac25  linuxdeploy" | sha256sum --check --strict --status
        wget -O appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
        echo "a6d71e2b6cd66f8e8d16c37ad164658985e0cf5fcaa950c90a482890cb9d13e0  appimagetool" | sha256sum --check --strict --status
        chmod +x linuxdeploy appimagetool
        # linuxdeploy invokes appimagetool from PATH during --output appimage.
        sudo mv appimagetool /usr/local/bin/appimagetool

    - name: Import GPG signing key
      env:
        GPG_PRIVATE_KEY: ${{ secrets.APPIMAGE_GPG_PRIVATE_KEY }}
      run: |
        # Dedicated release-signing key, provisioned as a repo secret (ASCII-armored
        # private key). Fail loud rather than silently shipping an unsigned release.
        test -n "$GPG_PRIVATE_KEY" || { echo "::error::APPIMAGE_GPG_PRIVATE_KEY secret is empty"; exit 1; }
        printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
        # appimagetool reads APPIMAGETOOL_SIGN_PASSPHRASE and feeds gpg via loopback;
        # gpg-agent must be told to accept it without an interactive pinentry prompt.
        mkdir -p "$HOME/.gnupg" && chmod 700 "$HOME/.gnupg"
        echo "allow-loopback-pinentry" >> "$HOME/.gnupg/gpg-agent.conf"
        gpgconf --kill gpg-agent

    - name: Build AppImage
      env:
        # GitHub runners lack FUSE; run the tools (and later the result) extracted.
        APPIMAGE_EXTRACT_AND_RUN: "1"
        # The Go binary is already stripped (-s -w) and the bundled system libs gain
        # little from stripping; skipping it removes a fragile step (linuxdeploy's strip
        # aborts on libraries using newer ELF sections, e.g. .relr.dyn) for ~2-3 MB.
        NO_STRIP: "true"
        # Passphrase for the release-signing key; consumed by appimagetool's --sign.
        APPIMAGETOOL_SIGN_PASSPHRASE: ${{ secrets.APPIMAGE_GPG_PASSPHRASE }}
      run: |
        VERSION=$(cat VERSION)
        mkdir -p stage AppDir/usr/share/metainfo

        # Desktop entry: point Exec at the bundled binary's basename.
        cp dist/linux/io.github.picocrypt_ng.Picocrypt-NG.desktop stage/
        sed -i 's|^Exec=.*|Exec=Picocrypt-NG %f|' stage/io.github.picocrypt_ng.Picocrypt-NG.desktop

        # App icon (must match the desktop Icon= key) rendered from the same SVG as the .deb.
        rsvg-convert --format png --width 256 --height 256 \
          --output stage/io.github.picocrypt_ng.Picocrypt-NG.png images/key.svg

        # AppStream metadata so AppImage-aware tooling can show app info / update sources.
        cp dist/linux/io.github.picocrypt_ng.Picocrypt-NG.metainfo.xml AppDir/usr/share/metainfo/

        # Deterministic output filename (independent of the binary's internal version).
        export OUTPUT="Picocrypt-NG-${VERSION}-x86_64.AppImage"
        export VERSION

        # AppImageUpdate delta-update transport: linuxdeploy embeds this string in the
        # .upd_info ELF section and emits the matching .zsync. The glob (not the literal
        # version) is what lets an installed build discover every future release; `latest`
        # resolves to the GitHub release marked "Latest" (non-prerelease). owner/repo come
        # from the running repo so forks point at themselves, not upstream.
        UPDATE_INFORMATION="gh-releases-zsync|${GITHUB_REPOSITORY%/*}|${GITHUB_REPOSITORY#*/}|latest|Picocrypt-NG-*-x86_64.AppImage.zsync"
        # GPG signing: key id is the primary fingerprint from the imported keyring.
        SIGN_KEY=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')
        test -n "$SIGN_KEY" || { echo "::error::no signing key in keyring"; exit 1; }
        # Both env-var spellings are exported on purpose: the pinned linuxdeploy build's
        # bundled appimage plugin uses the legacy names (OUTPUT/VERSION already prove the
        # legacy contract holds), while the LDAI_-prefixed names cover a newer plugin once
        # the tooling pin is refreshed. The verification below fails loud if neither path
        # produced a signed AppImage + .zsync, so a silent no-op cannot ship.
        export UPDATE_INFORMATION LDAI_UPDATE_INFORMATION="$UPDATE_INFORMATION"
        export SIGN=1 LDAI_SIGN=1 SIGN_KEY LDAI_SIGN_KEY="$SIGN_KEY"

        ./linuxdeploy \
          --appdir AppDir \
          --executable src/Picocrypt-NG \
          --desktop-file stage/io.github.picocrypt_ng.Picocrypt-NG.desktop \
          --icon-file stage/io.github.picocrypt_ng.Picocrypt-NG.png \
          --output appimage

        # Fail loud: the build must have produced the AppImage, its .zsync, and a real
        # signature from OUR key -- never ship a half-configured release artifact.
        test -f "$OUTPUT"
        test -f "${OUTPUT}.zsync" || { echo "::error::no .zsync produced -- update information was not honored"; exit 1; }
        objcopy -O binary --only-section=.sha256_sig "$OUTPUT" sig.bin
        test -s sig.bin || { echo "::error::.sha256_sig section empty -- AppImage was not signed"; exit 1; }
        objcopy -O binary --only-section=.sig_key "$OUTPUT" sig_key.asc
        EMBEDDED_FPR=$(gpg --show-keys --with-colons sig_key.asc | awk -F: '/^fpr:/ {print $10; exit}')
        test "$EMBEDDED_FPR" = "$SIGN_KEY" || { echo "::error::embedded signer $EMBEDDED_FPR != release key $SIGN_KEY"; exit 1; }
        rm -f sig.bin sig_key.asc

    - name: Smoke test AppImage
      env:
        APPIMAGE_EXTRACT_AND_RUN: "1"
      run: |
        VERSION=$(cat VERSION)
        APP="Picocrypt-NG-${VERSION}-x86_64.AppImage"
        # --version drives the embedded CLI (cli.Execute) and exits before Fyne/OpenGL
        # init, so this needs no display. It still loads every DT_NEEDED shared library at
        # startup, so a broken/incomplete bundle fails here instead of shipping silently.
        out=$("./$APP" --version)
        echo "$out"
        echo "$out" | grep -qi picocrypt

    - name: Prepare to upload artifacts
      run: |
        VERSION=$(cat VERSION)
        mkdir -p out
        mv "Picocrypt-NG-${VERSION}-x86_64.AppImage" out/
        mv "Picocrypt-NG-${VERSION}-x86_64.AppImage.zsync" out/

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: build-appimage-amd64
        # AppImage is already squashfs-compressed; re-zipping it gains nothing.
        path: out/*
        if-no-files-found: error
        compression-level: 0

  release:
    needs: build
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.publish_release) }}
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build-appimage-amd64
        path: artifacts

    - name: Get version tag
      run: |
        VERSION=$(cat VERSION)
        APP="Picocrypt-NG-${VERSION}-x86_64.AppImage"
        {
          echo "VERSION=$VERSION"
          echo "APPIMAGE_NAME=$APP"
        } >> "$GITHUB_ENV"

    - name: Sign and attest artifacts
      uses: ./.github/actions/sign-and-attest
      with:
        paths: |
          artifacts/${{ env.APPIMAGE_NAME }}
          artifacts/${{ env.APPIMAGE_NAME }}.zsync

    - name: Generate release notes
      uses: ./.github/actions/release-body
      with:
        version: ${{ env.VERSION }}

    - name: Release
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      with:
        body_path: ${{ github.workspace }}/release-body.md
        # The .zsync must ship alongside the AppImage: AppImageUpdate fetches it from the
        # same release to compute deltas. Without it the embedded update info is a dead end.
        files: |
          artifacts/${{ env.APPIMAGE_NAME }}
          artifacts/${{ env.APPIMAGE_NAME }}.zsync
          artifacts/${{ env.APPIMAGE_NAME }}.sigstore.json
          artifacts/${{ env.APPIMAGE_NAME }}.zsync.sigstore.json
        tag_name: ${{ env.VERSION }}
        overwrite_files: false
