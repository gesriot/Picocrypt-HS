name: android-instrumented

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      test_scope:
        description: Instrumented test scope
        required: true
        default: focused
        type: choice
        options:
          - focused
          - extended

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-instrumented:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: "1.26.0"
        cache-dependency-path: src/go.sum

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260209203831-923679eb55af
        go install golang.org/x/mobile/cmd/gobind@v0.0.0-20260209203831-923679eb55af
        mkdir -p "$(go env GOPATH | cut -d: -f1)/pkg/gomobile"

    - name: Set up Android SDK
      uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

    - name: Set up JDK 21
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: "temurin"
        java-version: "21"

    - name: Install Android SDK packages
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager "platforms;android-37.0" "build-tools;36.0.0" "ndk;29.0.14206865"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"

    - name: Cache Gradle dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          android/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Compute Android version metadata
      run: |
        VERSION=$(cat VERSION)
        IFS='.' read -r major minor patch <<< "$VERSION"
        major=${major:-0}
        minor=${minor:-0}
        patch=${patch:-0}
        VERSION_CODE=$((10#$major * 10000 + 10#$minor * 100 + 10#$patch))
        echo "ORG_GRADLE_PROJECT_PICOCRYPT_VERSION_NAME=$VERSION" >> "$GITHUB_ENV"
        echo "ORG_GRADLE_PROJECT_PICOCRYPT_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

    - name: Build Go Mobile AAR
      working-directory: android
      run: |
        chmod +x build-gomobile.sh
        ./build-gomobile.sh

    - name: Make gradlew executable
      working-directory: android
      run: chmod +x gradlew

    - name: Run Unit Tests
      working-directory: android
      run: ./gradlew test

    - name: Build Debug APK
      working-directory: android
      run: ./gradlew assembleDebug

    - name: Compile Instrumented Tests
      working-directory: android
      run: ./gradlew :app:compileDebugAndroidTestKotlin

    - name: Assemble Instrumented Test APK
      working-directory: android
      run: ./gradlew :app:assembleDebugAndroidTest

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run focused instrumented tests
      uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
      with:
        # API 36 (= targetSdk), not 34: needed for API 35+ FGS timeout / onTimeout.
        api-level: 36
        arch: x86_64
        disable-animations: true
        # -memory 6144: the Argon2id KDF allocates 1 GiB per operation
        # (src/internal/crypto/kdf.go); the runner's default ~2.5 GiB emulator OOMs
        # (lowmemorykiller kills the test process) mid crypto roundtrip.
        emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -memory 6144 -cores 4 -camera-back none -camera-front none
        # Single-line: the runner executes each script line in its own `sh -c`,
        # so multi-line `cd`/`if`/`fi` constructs do not persist across lines.
        working-directory: android
        script: TEST_CLASSES="io.github.picocrypt_ng.picocrypt_ng.ui.components.PasswordCardTest,io.github.picocrypt_ng.picocrypt_ng.ui.components.ProgressCardTest,io.github.picocrypt_ng.picocrypt_ng.ui.components.DecryptOptionsCardTest,io.github.picocrypt_ng.picocrypt_ng.ui.components.ErrorDialogTest,io.github.picocrypt_ng.picocrypt_ng.ui.components.FileCardTest"; { [ "${{ inputs.test_scope }}" = "extended" ] && TEST_CLASSES="$TEST_CLASSES,io.github.picocrypt_ng.picocrypt_ng.OperationManagerIntegrationTest"; } || true; ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class="$TEST_CLASSES"

    - name: Upload instrumented test report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: instrumented-test-report
        path: |
          android/app/build/reports/androidTests/connected/
          android/app/build/outputs/androidTest-results/connected/
        if-no-files-found: warn

    - name: Prepare artifacts
      run: |
        mkdir -p out
        cp android/app/build/outputs/apk/debug/app-debug.apk out/Picocrypt-NG-android-debug.apk

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: android-instrumented-ONLY-FOR-TESTING
        path: out/*.apk
        if-no-files-found: error
        compression-level: 9
