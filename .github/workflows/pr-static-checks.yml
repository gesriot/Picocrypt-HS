name: pr-static-checks

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: static-checks
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: stable
        cache-dependency-path: src/go.sum

    # GUI packages (internal/ui) import Fyne, so vet/lint/govulncheck need the
    # same CGO/OpenGL headers the Linux build job installs.
    - name: Install packages
      run: |
        sudo apt update
        sudo apt install -y gcc pkg-config libgl1-mesa-dev xorg-dev libgtk-3-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev

    - name: Install dependencies
      run: |
        cd src
        go mod download

    - name: Check formatting (gofmt)
      run: |
        cd src
        unformatted=$(gofmt -l . | grep -v '^testdata/legacy/' || true)
        if [ -n "$unformatted" ]; then
          echo "These files are not gofmt-clean (run: gofmt -w <file>):"
          echo "$unformatted"
          exit 1
        fi

    - name: Vet
      run: |
        cd src
        CGO_ENABLED=1 go vet ./...

    # Pin the linter: the v2 src/.golangci.yml schema is version-sensitive, so
    # @latest would make CI non-reproducible.
    - name: Lint (golangci-lint)
      run: |
        cd src
        go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
        export PATH="$PATH:$(go env GOPATH)/bin"
        golangci-lint run ./...

    - name: Vulnerability scan (govulncheck)
      run: |
        cd src
        go install golang.org/x/vuln/cmd/govulncheck@latest
        export PATH="$PATH:$(go env GOPATH)/bin"
        govulncheck ./...
