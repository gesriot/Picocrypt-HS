name: pr-test-build-windows

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-test-build-windows:
    runs-on: windows-2025
    env:
      RESHACKER_SHA256: e5a5b6d6be38ae3eb20e72b09f257f284bab2deb5f37164e9f2faefd23f27cf4
      UPX_SHA256: b471ebf1b7f20f4a89150264ed9a008a2a5bfd247f3c6d1184a75bb59ca08f5d
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: "1.26.5"
        cache-dependency-path: src/go.sum

    - name: Install dependencies
      run: |
        cd src
        go mod download

    - name: Run tests
      run: |
        cd src
        go test -v -timeout 15m ./...
      env:
        PICOCRYPT_RUN_CLI_INTEGRATION: 1

    - name: Build GUI
      run: |
        cd src
        go build -v -ldflags="-s -w -H=windowsgui -extldflags=-static" -o 1.exe ./cmd/picocrypt
      env:
        CGO_ENABLED: 1
        GOAMD64: v1

    - name: Build CLI-only (no graphics dependencies)
      run: |
        cd src
        go build -v -tags cli -ldflags="-s -w -extldflags=-static" -o Picocrypt-NG-cli.exe ./cmd/picocrypt
      env:
        CGO_ENABLED: 1
        GOAMD64: v1

    - name: Add icon, manifest, and version info
      shell: pwsh
      run: |
        Invoke-WebRequest -OutFile reshacker_setup.zip https://github.com/user-attachments/files/18878075/reshacker_setup.zip
        $expectedHash = $env:RESHACKER_SHA256
        $actualHash = (Get-FileHash reshacker_setup.zip -Algorithm SHA256).Hash.ToLower()
        if ($actualHash -ne $expectedHash) {
          throw "Checksum mismatch for reshacker_setup.zip: expected $expectedHash, got $actualHash"
        }
        Expand-Archive -DestinationPath reshacker_setup reshacker_setup.zip
        $installer = Start-Process `
          -FilePath "reshacker_setup/reshacker_setup.exe" `
          -ArgumentList "/SILENT" `
          -Wait -PassThru
        if ($installer.ExitCode -ne 0) {
          throw "Resource Hacker installer failed with exit code $($installer.ExitCode)"
        }
        if (-not (Test-Path -LiteralPath $env:P -PathType Leaf)) {
          throw "Resource Hacker executable was not installed at $env:P"
        }

        function Invoke-ResourceHacker {
          param(
            [Parameter(Mandatory)][string[]]$Arguments,
            [Parameter(Mandatory)][string]$ExpectedOutput
          )

          $process = Start-Process `
            -FilePath $env:P `
            -ArgumentList ($Arguments + @("-log", "CONSOLE")) `
            -Wait -PassThru -NoNewWindow
          if ($process.ExitCode -ne 0) {
            throw "Resource Hacker failed with exit code $($process.ExitCode): $($Arguments -join ' ')"
          }

          $output = Get-Item -LiteralPath $ExpectedOutput -ErrorAction Stop
          if ($output.Length -eq 0) {
            throw "Resource Hacker produced an empty output: $ExpectedOutput"
          }
        }

        Invoke-ResourceHacker `
          -Arguments @("-open", "src/1.exe", "-save", "src/2.exe", "-action", "addoverwrite", "-res", "images/key.ico", "-mask", "ICONGROUP,MAINICON,") `
          -ExpectedOutput "src/2.exe"

        Invoke-ResourceHacker `
          -Arguments @("-open", "src/2.exe", "-save", "src/3.exe", "-action", "addoverwrite", "-res", "images/key.ico", "-mask", "ICONGROUP,A,") `
          -ExpectedOutput "src/3.exe"

        Invoke-ResourceHacker `
          -Arguments @("-open", "src/3.exe", "-save", "src/4.exe", "-action", "addoverwrite", "-res", "dist/windows/manifest.xml", "-mask", "MANIFEST,1,") `
          -ExpectedOutput "src/4.exe"

        Invoke-ResourceHacker `
          -Arguments @("-open", "dist/windows/versioninfo.rc", "-save", "resources.res", "-action", "compile") `
          -ExpectedOutput "resources.res"

        Invoke-ResourceHacker `
          -Arguments @("-open", "src/4.exe", "-save", "src/5.exe", "-action", "addoverwrite", "-res", "resources.res") `
          -ExpectedOutput "src/5.exe"
      env:
        P: "C:\\Program Files (x86)\\Resource Hacker\\ResourceHacker.exe"

    - name: Compress with upx
      shell: pwsh
      run: |
        Invoke-WebRequest -OutFile upx.zip https://github.com/upx/upx/releases/download/v5.2.0/upx-5.2.0-win64.zip
        $expectedHash = $env:UPX_SHA256
        $actualHash = (Get-FileHash upx.zip -Algorithm SHA256).Hash.ToLower()
        if ($actualHash -ne $expectedHash) {
          throw "Checksum mismatch for upx.zip: expected $expectedHash, got $actualHash"
        }
        Expand-Archive -DestinationPath upx upx.zip
        upx/upx-5.2.0-win64/upx.exe --lzma -o src/Picocrypt-NG.exe src/5.exe
        upx/upx-5.2.0-win64/upx.exe --lzma src/Picocrypt-NG-cli.exe

    # === Phase 4 (FA-WIN-04): build NSIS installer ===
    # NSIS is NOT pre-installed on windows-2025 [actions/runner-images#11754,
    # verified 2026-05-01]; CONTEXT D-04 assumed pre-install based on
    # windows-2022 precedent — invalidated. We install via choco; choco itself
    # is part of the runner baseline (no SHA pinning required for choco-managed
    # packages — choco verifies its own signatures).
    - name: Rename portable artifact
      shell: pwsh
      run: |
        Move-Item src/Picocrypt-NG.exe src/Picocrypt-NG-portable.exe

    - name: Install NSIS
      shell: pwsh
      run: |
        choco install -y --no-progress nsis
        & "C:\Program Files (x86)\NSIS\makensis.exe" -VERSION

    - name: Build NSIS installer
      shell: pwsh
      run: |
        $version = (Get-Content -Path "VERSION" -Raw).Trim()
        Write-Host "Building installer for version: $version"
        # Pass absolute path so NSIS ${__FILEDIR__} resolves to the absolute
        # script directory; otherwise the Icon directive re-applies script-dir
        # resolution to a relative ${__FILEDIR__}, doubling the path
        # (D:\...\dist\windows\dist\windows\..\..\images\key.ico — file not found).
        $scriptPath = (Resolve-Path "dist\windows\installer.nsi").Path
        & "C:\Program Files (x86)\NSIS\makensis.exe" `
          -WX `
          -V4 `
          "-DVERSION=$version" `
          "$scriptPath"
        if ($LASTEXITCODE -ne 0) {
          throw "makensis failed with exit code $LASTEXITCODE"
        }

    - name: Smoke-test installer
      shell: pwsh
      run: |
        $setup = "dist\windows\Picocrypt-NG-Setup.exe"
        if (-not (Test-Path $setup)) {
          throw "Setup.exe not produced at $setup"
        }
        $size = (Get-Item $setup).Length
        Write-Host "Setup.exe size: $size bytes"
        if ($size -lt 1MB) {
          throw "Setup.exe suspiciously small (< 1 MB): $size bytes"
        }
        if ($size -gt 100MB) {
          throw "Setup.exe suspiciously large (> 100 MB): $size bytes"
        }
    # === end Phase 4 ===

    - name: Upload artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: pr-test-build-windows-ONLY-FOR-TESTING
        path: |
          src/Picocrypt-NG-portable.exe
          src/Picocrypt-NG-cli.exe
          dist/windows/Picocrypt-NG-Setup.exe
        if-no-files-found: error
        compression-level: 9
