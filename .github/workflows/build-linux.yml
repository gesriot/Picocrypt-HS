name: build-linux

permissions:
  contents: read

on:
  push:
    paths:
      - "VERSION"
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish artifacts to the GitHub release. Existing assets are never overwritten."
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            upx_pkg: upx-5.2.0-amd64_linux
            upx_sha256: 3db5d3294707439db97866feab8d75d800f028f48481a40547411824da4288a1
            gui_binary: Picocrypt-NG
            cli_binary: Picocrypt-NG-cli
            artifact_name: build-linux-amd64
            build_deb: "true"
          - arch: arm64
            runner: ubuntu-24.04-arm
            upx_pkg: upx-5.2.0-arm64_linux
            upx_sha256: 55d48a61e8ffd17152db871c855376cba7f08e830b37799d0947a16dff8ec36c
            gui_binary: Picocrypt-NG-arm64
            cli_binary: Picocrypt-NG-cli-arm64
            artifact_name: build-linux-arm64
            build_deb: "false"
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: "1.26.5"
        cache-dependency-path: src/go.sum

    - name: Update repository
      run: |
        sudo apt update

    - name: Install packages
      run: |
        sudo apt install -y gcc pkg-config libgl1-mesa-dev xorg-dev libgtk-3-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev wget libxml2-utils librsvg2-bin desktop-file-utils appstream

    - name: Install Linux GUI smoke dependencies
      if: matrix.arch == 'amd64'
      run: |
        sudo apt install -y xvfb openbox xdotool wmctrl libgl1-mesa-dri

    - name: Validate dist artefacts
      run: |
        xmllint --noout dist/mime/application-x-pcv.xml
        xmllint --noout images/key.svg
        xmllint --noout images/pcv-icon.svg
        output=$(desktop-file-validate dist/linux/io.github.picocrypt_ng.Picocrypt-NG.desktop)
        if [ -n "$output" ]; then echo "$output"; exit 1; fi
        appstreamcli validate --no-net dist/linux/io.github.picocrypt_ng.Picocrypt-NG.metainfo.xml

    - name: Install dependencies
      run: |
        cd src
        go mod download

    - name: Run tests
      run: |
        cd src
        if [ "${{ matrix.arch }}" = "amd64" ]; then
          # Under -race, concurrent Argon2 volume and Fyne package tests exceed the
          # runner's RAM, so cap package binaries at two. CLI integration spawns a
          # separate non-race product binary, so run it separately without -race.
          CGO_ENABLED=1 go test -v -tags migrated_fynedo -race -p 2 -timeout 15m ./...
          PICOCRYPT_RUN_CLI_INTEGRATION=1 CGO_ENABLED=1 go test -v -timeout 15m ./internal/cli/...
        else
          PICOCRYPT_RUN_CLI_INTEGRATION=1 CGO_ENABLED=1 go test -v -tags migrated_fynedo -timeout 15m ./...
        fi

    - name: Build GUI
      run: |
        cd src
        if [ "${{ matrix.arch }}" = "amd64" ]; then
          export GOAMD64=v1
        fi
        GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build -v -tags migrated_fynedo -ldflags="-s -w" -o "${{ matrix.gui_binary }}" ./cmd/picocrypt

    - name: Smoke test Linux GUI
      if: matrix.arch == 'amd64'
      run: .github/scripts/smoke-linux-gui.sh "src/${{ matrix.gui_binary }}"

    - name: Build CLI-only (no graphics dependencies)
      run: |
        cd src
        if [ "${{ matrix.arch }}" = "amd64" ]; then
          export GOAMD64=v1
        fi
        GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build -v -tags cli -ldflags="-s -w" -o "${{ matrix.cli_binary }}" ./cmd/picocrypt

    - name: Compress with upx
      run: |
        wget -O upx.tar.xz https://github.com/upx/upx/releases/download/v5.2.0/${{ matrix.upx_pkg }}.tar.xz
        echo "${{ matrix.upx_sha256 }}  upx.tar.xz" | sha256sum --check --strict --status
        tar -xf upx.tar.xz
        ${{ matrix.upx_pkg }}/upx --lzma "src/${{ matrix.gui_binary }}"
        ${{ matrix.upx_pkg }}/upx --lzma "src/${{ matrix.cli_binary }}"

    - name: Package as .deb
      if: matrix.build_deb == 'true'
      run: |
        package_root="Picocrypt-NG/Picocrypt-NG"
        install -d "$package_root/DEBIAN"
        install -d "$package_root/usr/bin"
        install -d "$package_root/usr/share/applications"
        install -d "$package_root/usr/share/icons/hicolor/scalable/apps"
        install -m 0755 "src/${{ matrix.gui_binary }}" "$package_root/usr/bin/picocrypt-ng-gui"
        install -m 0644 images/key.svg \
            "$package_root/usr/share/icons/hicolor/scalable/apps/io.github.picocrypt_ng.Picocrypt-NG.svg"
        for size in 16 32 48 64 128 256; do
          app_icon_png="$package_root/usr/share/icons/hicolor/${size}x${size}/apps/io.github.picocrypt_ng.Picocrypt-NG.png"
          install -d "$(dirname "$app_icon_png")"
          rsvg-convert --format png --width "$size" --height "$size" --output "$app_icon_png" images/key.svg
          test -s "$app_icon_png"
        done
        VERSION=$(cat VERSION)
        cat > "$package_root/DEBIAN/control" <<EOF
        Package: picocrypt-ng
        Version: $VERSION
        Architecture: ${{ matrix.arch }}
        Maintainer: Picocrypt-NG
        Priority: optional
        Section: utils
        Depends: shared-mime-info, desktop-file-utils, hicolor-icon-theme
        Recommends: gtk-update-icon-cache
        Description: Picocrypt-NG file encryption utility
        EOF
        install -m 0644 dist/linux/io.github.picocrypt_ng.Picocrypt-NG.desktop \
            "$package_root/usr/share/applications/io.github.picocrypt_ng.Picocrypt-NG.desktop"
        sed -i 's|^Exec=.*|Exec=/usr/bin/picocrypt-ng-gui %f|' \
            "$package_root/usr/share/applications/io.github.picocrypt_ng.Picocrypt-NG.desktop"
        install -d "$package_root/usr/share/mime/packages"
        install -m 0644 dist/mime/application-x-pcv.xml \
            "$package_root/usr/share/mime/packages/application-x-pcv.xml"
        for size in 16 32 48 64 128 256; do
          install -d "$package_root/usr/share/icons/hicolor/${size}x${size}/mimetypes"
          install -m 0644 "images/pcv-icon-${size}.png" \
            "$package_root/usr/share/icons/hicolor/${size}x${size}/mimetypes/application-x-pcv.png"
        done
        install -d "$package_root/usr/share/icons/hicolor/scalable/mimetypes"
        install -m 0644 images/pcv-icon.svg \
            "$package_root/usr/share/icons/hicolor/scalable/mimetypes/application-x-pcv.svg"
        cat > "$package_root/DEBIAN/postinst" <<'EOF'
        #!/bin/sh
        set -e
        case "$1" in
          configure)
            if command -v update-mime-database >/dev/null 2>&1; then
              update-mime-database /usr/share/mime || true
            fi
            if command -v update-desktop-database >/dev/null 2>&1; then
              update-desktop-database -q /usr/share/applications || true
            fi
            if [ -e /usr/share/icons/hicolor/icon-theme.cache ]; then
              touch /usr/share/icons/hicolor
              if command -v gtk-update-icon-cache >/dev/null 2>&1; then
                gtk-update-icon-cache -q -f -t /usr/share/icons/hicolor || true
              fi
            fi
            ;;
          abort-upgrade|abort-remove|abort-deconfigure)
            ;;
        esac
        exit 0
        EOF
        chmod 0755 "$package_root/DEBIAN/postinst"
        cat > "$package_root/DEBIAN/postrm" <<'EOF'
        #!/bin/sh
        set -e
        case "$1" in
          remove|purge)
            if command -v update-mime-database >/dev/null 2>&1; then
              update-mime-database /usr/share/mime || true
            fi
            if command -v update-desktop-database >/dev/null 2>&1; then
              update-desktop-database -q /usr/share/applications || true
            fi
            if [ -e /usr/share/icons/hicolor/icon-theme.cache ]; then
              touch /usr/share/icons/hicolor
              if command -v gtk-update-icon-cache >/dev/null 2>&1; then
                gtk-update-icon-cache -q -f -t /usr/share/icons/hicolor || true
              fi
            fi
            ;;
          upgrade|failed-upgrade|abort-install|abort-upgrade|disappear)
            ;;
        esac
        exit 0
        EOF
        chmod 0755 "$package_root/DEBIAN/postrm"
        sh -n "$package_root/DEBIAN/postinst"
        sh -n "$package_root/DEBIAN/postrm"
        dpkg-deb -Zxz --build --root-owner-group "$package_root"
        dpkg-deb -c "${package_root}.deb" | grep -E 'usr/share/applications/io\.github\.picocrypt_ng\.Picocrypt-NG\.desktop' >/dev/null
        dpkg-deb -c "${package_root}.deb" | grep -E 'usr/share/icons/hicolor/scalable/apps/io\.github\.picocrypt_ng\.Picocrypt-NG\.svg' >/dev/null
        dpkg-deb -c "${package_root}.deb" | grep -E 'usr/share/icons/hicolor/16x16/apps/io\.github\.picocrypt_ng\.Picocrypt-NG\.png' >/dev/null
        dpkg-deb -c "${package_root}.deb" | grep -E 'usr/share/icons/hicolor/32x32/apps/io\.github\.picocrypt_ng\.Picocrypt-NG\.png' >/dev/null
        dpkg-deb -c "${package_root}.deb" | grep -E 'usr/share/icons/hicolor/48x48/apps/io\.github\.picocrypt_ng\.Picocrypt-NG\.png' >/dev/null
        dpkg-deb -c "${package_root}.deb" | grep -E 'usr/share/icons/hicolor/64x64/apps/io\.github\.picocrypt_ng\.Picocrypt-NG\.png' >/dev/null
        dpkg-deb -c "${package_root}.deb" | grep -E 'usr/share/icons/hicolor/128x128/apps/io\.github\.picocrypt_ng\.Picocrypt-NG\.png' >/dev/null
        dpkg-deb -c "${package_root}.deb" | grep -E 'usr/share/icons/hicolor/256x256/apps/io\.github\.picocrypt_ng\.Picocrypt-NG\.png' >/dev/null
        dpkg-deb -c "${package_root}.deb" | grep -E 'usr/share/mime/packages/application-x-pcv\.xml' >/dev/null
        dpkg-deb -c "${package_root}.deb" | grep -E 'usr/share/icons/hicolor/[0-9]+x[0-9]+/mimetypes/application-x-pcv\.png' >/dev/null
        dpkg-deb -c "${package_root}.deb" | grep -E 'usr/share/icons/hicolor/scalable/mimetypes/application-x-pcv\.svg' >/dev/null

    - name: Prepare to upload artifacts
      run: |
        mkdir -p out
        mv "src/${{ matrix.gui_binary }}" out
        mv "src/${{ matrix.cli_binary }}" out
        if [ "${{ matrix.build_deb }}" = "true" ]; then
          mv Picocrypt-NG/Picocrypt-NG.deb out
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ matrix.artifact_name }}
        path: out/*
        if-no-files-found: error
        compression-level: 9

  release:
    needs: build
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.publish_release) }}
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: artifacts

    - name: Get version tag
      run: |
        VERSION=$(cat VERSION)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Sign and attest artifacts
      uses: ./.github/actions/sign-and-attest
      with:
        paths: |
          artifacts/build-linux-amd64/Picocrypt-NG
          artifacts/build-linux-amd64/Picocrypt-NG-cli
          artifacts/build-linux-amd64/Picocrypt-NG.deb
          artifacts/build-linux-arm64/Picocrypt-NG-arm64
          artifacts/build-linux-arm64/Picocrypt-NG-cli-arm64

    - name: Generate release notes
      uses: ./.github/actions/release-body
      with:
        version: ${{ env.VERSION }}

    - name: Release
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      with:
        body_path: ${{ github.workspace }}/release-body.md
        files: |
          artifacts/build-linux-amd64/Picocrypt-NG
          artifacts/build-linux-amd64/Picocrypt-NG-cli
          artifacts/build-linux-amd64/Picocrypt-NG.deb
          artifacts/build-linux-arm64/Picocrypt-NG-arm64
          artifacts/build-linux-arm64/Picocrypt-NG-cli-arm64
          artifacts/build-linux-amd64/*.sigstore.json
          artifacts/build-linux-arm64/*.sigstore.json
        tag_name: ${{ env.VERSION }}
        make_latest: true
        overwrite_files: false
