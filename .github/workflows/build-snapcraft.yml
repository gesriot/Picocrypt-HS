name: build-snapcraft

permissions:
  contents: read

on:
  push:
    paths:
      - "VERSION"
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-snapcraft:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Copy Snapcraft files to source
      run: |
        cp -r dist/snapcraft/* src/
        mkdir -p src/dist/mime
        cp dist/mime/application-x-pcv.xml src/dist/mime/
        cp -r images src/

    - name: Fix permissions
      run: |
        chmod -R a+rX src

    - name: List contents of src
      run: |
        ls -l src
        ls -l src/snapcraft.yaml || echo "snapcraft.yaml not found"

    - name: Snapcraft
      uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79
      with:
        path: src

    - name: Prepare artifacts
      run: |
        mkdir -p out
        mv src/*.snap out/

    - name: Smoke-test snap command
      env:
        LANG: C.UTF-8
        LC_ALL: C.UTF-8
      run: |
        sudo snap install --dangerous out/*.snap
        snap run picocrypt-ng --version

    - name: Upload .snap artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: build-snapcraft
        path: out/*.snap
        if-no-files-found: error
        compression-level: 9

  release:
    needs: build-snapcraft
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Download .snap artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build-snapcraft
        path: out

    - name: Get version tag
      run: |
        VERSION=$(cat VERSION)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Sign and attest artifacts
      uses: ./.github/actions/sign-and-attest
      with:
        paths: |
          out/*.snap

    - name: Generate release notes
      uses: ./.github/actions/release-body
      with:
        version: ${{ env.VERSION }}

    - name: Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
      with:
        body_path: ${{ github.workspace }}/release-body.md
        files: |
          out/*.snap
          out/*.sigstore.json
        tag_name: ${{ env.VERSION }}
        make_latest: true
